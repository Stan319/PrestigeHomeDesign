<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PrestigeHomeDesign | Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef3f8; /* same blue tone */
      font-family: "Inter", sans-serif;
      color: #1a1a1a;
    }

    .card {
      background: #ffffff;
      padding: 4rem;
      border-radius: 20px;
      max-width: 520px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.08);
    }

    img {
      max-width: 200px;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: "Playfair Display", serif;
      font-size: 2.4rem;
      margin-bottom: 1rem;
    }

    p {
      color: #555;
      line-height: 1.6;
    }

    .small {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="/assets/uploads/phd-logo.png" alt="PrestigeHomeDesign logo" />

    <h1>Website Coming Soon</h1>
    <p>
      PrestigeHomeDesign is currently building a new digital experience.<br />
      Please check back soon.
    </p>

    <p class="small">
      Remodeling • Additions • ADUs • Ground-Up Builds<br />
      Southern California
    </p>
  </div>
</body>
</html>
